name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer push to the same branch/PR cancels the in-flight run so CI always
# reflects the latest commit and merges aren't gated on stale results.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, build & smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # Builds with no secrets — the app degrades gracefully when env vars
        # are absent, so CI verifies the build without exposing any keys.
        run: npm run build

      - name: Smoke test (boot app, check key pages render)
        # Catches changes that compile but crash at runtime: boots the production
        # server and asserts the main pages return HTTP 200. Runs in demo mode
        # (no secrets), so it exercises the bundled-catalogue fallback paths.
        run: |
          set -uo pipefail
          npm run start &
          SERVER_PID=$!
          # Wait for the server to accept connections (up to ~60s).
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:3000/ && break
            sleep 2
          done
          fail=0
          for path in / /shop /product/midnight-detox; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000$path")
            echo "$path -> $code"
            [ "$code" = "200" ] || { echo "::error::$path returned $code"; fail=1; }
          done
          kill "$SERVER_PID" 2>/dev/null || true
          exit $fail
