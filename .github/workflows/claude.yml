name: Claude

# Follow-up / iteration: mention "@claude" in a comment on an issue or PR (or in
# a PR review) and Claude will pick up the request and update the pull request.
#
# Newly OPENED issues are handled automatically by `claude-auto.yml` (no mention
# needed), so this workflow intentionally does NOT trigger on `issues` — that
# avoids a double run when a new issue also happens to contain "@claude".
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Uses your Claude subscription token (run `claude setup-token`).
          # Alternatively, swap this for: anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pin to Opus (model is passed through to the Claude CLI via claude_args).
          claude_args: "--model claude-opus-4-8"
