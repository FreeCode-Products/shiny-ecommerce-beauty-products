name: Claude — implement issue

# Every newly opened issue is implemented automatically — NO "@claude" mention
# needed. Claude reads the issue, makes the change on a `claude/*` branch and
# opens a pull request. From there CI gates it, auto-merge squash-merges it into
# main, and Vercel deploys. So: open an issue → it ships.
#
# To be selective instead, add a label gate to the job, e.g.:
#   if: contains(github.event.issue.labels.*.name, 'build')
on:
  issues:
    types: [opened]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Implement the issue and open a PR
        uses: anthropics/claude-code-action@v1
        with:
          # Same credential the mention-based workflow uses.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pin to Opus (model is passed through to the Claude CLI via claude_args).
          claude_args: "--model claude-opus-4-8"
          # Tag mode + tracking comment, tied to this issue's context.
          track_progress: true
          prompt: |
            Implement the change described in this GitHub issue, then open a pull
            request that closes it.

            Guidelines:
            - Keep the change focused on exactly what the issue asks for.
            - Follow the repo conventions (see AGENTS.md / CLAUDE.md).
            - The PR must pass CI (`npm run lint`, `npm run build`, and the page
              smoke test) — that green CI run is the gate that auto-merges the PR
              to main and deploys it.
            - If the change requires a Supabase (database) schema change, add it as
              a NEW migration file `supabase/migrations/<UTC-date>_<desc>.sql`
              (e.g. `20260605_add_orders_note.sql`). It is applied to production
              automatically on merge, so it MUST be idempotent and additive-only:
              use `IF NOT EXISTS` / `ADD COLUMN IF NOT EXISTS` / `CREATE OR REPLACE`
              / `DROP POLICY IF EXISTS` then `CREATE POLICY`, and never use
              destructive statements (DROP/DELETE/TRUNCATE or data-losing type
              changes). See supabase/migrations/README.md. Do NOT tell the user to
              run SQL by hand.
